<!DOCTYPE html>
<html lang="en" id="root">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HA Wrapped</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Archivo:wdth,wght@62..125,700..900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#171210;          /* altbier dark */
    --bg2:#1f1814;
    --copper:#d98e32;      /* the one loud color */
    --cream:#efe5d3;
    --dim:#8a7c66;
    --line:#3a2f26;
    --red:#c8553d;
  }
  *{box-sizing:border-box;margin:0}
  html{scroll-snap-type:y mandatory}
  body{
    background:var(--bg);
    color:var(--cream);
    font-family:"IBM Plex Mono",ui-monospace,monospace;
  }
  .card{
    min-height:100vh; min-height:100svh;
    scroll-snap-align:start;
    display:flex; flex-direction:column; justify-content:center;
    max-width:480px; margin:0 auto;
    padding:48px 28px;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
    position:relative;
  }
  .eyebrow{
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--dim); margin-bottom:18px;
  }
  .eyebrow b{color:var(--copper); font-weight:500}
  h1,h2{
    font-family:"Archivo",sans-serif;
    font-variation-settings:"wdth" 70;
    font-weight:900; line-height:.95; text-transform:uppercase;
  }
  h1{font-size:clamp(44px,11vw,72px)}
  h2{font-size:clamp(28px,7vw,40px); margin-bottom:28px}
  .sub{color:var(--dim); font-size:14px; line-height:1.6; margin-top:20px}

  /* signature: mechanical meter readout */
  .odo{display:flex; gap:5px; flex-wrap:wrap; margin:6px 0 10px}
  .odo .d{
    background:var(--bg2);
    border:1px solid var(--line);
    border-bottom:3px solid var(--copper);
    border-radius:4px;
    min-width:.72em; padding:6px 4px 4px;
    font-size:clamp(40px,10vw,64px); font-weight:700;
    text-align:center; color:var(--cream);
    overflow:hidden; height:1.35em; position:relative;
  }
  .odo .d .reel{display:block; transform:translateY(0); transition:transform 1.6s cubic-bezier(.16,1,.3,1)}
  .odo .d .reel span{display:block; height:1.35em; line-height:1.35em}
  .odo .sep{font-size:clamp(40px,10vw,64px); font-weight:700; color:var(--dim); align-self:flex-end}
  .unit{color:var(--copper); font-size:15px; letter-spacing:.14em; text-transform:uppercase}

  .quip{margin-top:26px; font-size:15px; line-height:1.65; color:var(--cream)}
  .quip::before{content:"// "; color:var(--copper)}
  .footnote{margin-top:10px; font-size:12px; color:var(--dim); line-height:1.5}

  .spark{margin-top:34px}
  .spark svg{width:100%; height:54px; display:block}
  .spark .lbl{display:flex; justify-content:space-between; font-size:10px;
    letter-spacing:.18em; color:var(--dim); margin-top:6px; text-transform:uppercase}

  .idx{position:absolute; top:24px; right:28px; font-size:11px; color:var(--dim)}
  .hint{position:absolute; bottom:22px; left:28px; font-size:11px;
    letter-spacing:.2em; color:var(--dim); text-transform:uppercase}
  .outro .stamp{
    display:inline-block; margin-top:30px; padding:10px 14px;
    border:1px solid var(--copper); color:var(--copper);
    font-size:12px; letter-spacing:.2em; text-transform:uppercase;
    transform:rotate(-2deg);
  }
  @media (prefers-reduced-motion: reduce){
    .odo .d .reel{transition:none}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA = {"year": 2025, "lang": "en", "house": "Demo Home", "i18n": {"scroll": "scroll", "trend": "over the year", "jan": "Jan", "dec": "Dec"}, "intro_title": "Wrapped 2025", "intro_sub": "Your home kept count. Every single second. It is not sorry.", "outro_title": "See you next year.", "outro_sub": "The sensors never sleep. Apparently neither do you.", "stats": [{"id": "sensor.water_meter_total", "headline": "Water through the pipes", "display_value": "87,412", "unit": "liters", "quip": "That's roughly 350 bathtubs. Or one very wet year.", "footnote": "Measured per wM-Bus, second by second.", "series": [6200, 5900, 7100, 6800, 7400, 8100, 9200, 8800, 7600, 7000, 6500, 6812]}, {"id": "binary_sensor.washing_machine_running", "headline": "Laundry loads", "display_value": "312", "unit": "loads", "quip": "Statistically speaking, that's a laundromat with feelings.", "footnote": "", "series": [18, 17, 22, 25, 28, 30, 31, 29, 27, 28, 28, 29]}, {"id": "cover.living_room_shutter", "headline": "Shutter travel distance", "display_value": "4,218", "unit": "meters", "quip": "If this were an elevator, it would deserve a tip.", "footnote": "", "series": [280, 290, 310, 350, 400, 420, 460, 450, 380, 330, 290, 258]}, {"id": "binary_sensor.coffee_machine_running", "headline": "Coffees brewed", "display_value": "1,047", "unit": "cups", "quip": "2.9 per day. Suspiciously correlated with the laundry loads.", "footnote": "", "series": [80, 78, 85, 90, 92, 95, 98, 96, 90, 88, 85, 70]}]};

const I = DATA.i18n || {scroll:"scroll",trend:"trend",jan:"Jan",dec:"Dec"};
document.getElementById("root").lang = DATA.lang || "en";
const app = document.getElementById("app");
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function odometer(display){
  // display is a pre-formatted German number string like "12.345,6"
  return '<div class="odo">' + [...display].map(ch =>
    /[0-9]/.test(ch)
      ? `<span class="d"><span class="reel" data-digit="${ch}">` +
        Array.from({length:10},(_,i)=>`<span>${i}</span>`).join("") +
        `</span></span>`
      : `<span class="sep">${esc(ch)}</span>`
  ).join("") + "</div>";
}

function sparkline(series){
  if(!series || series.filter(v=>v>0).length < 2) return "";
  const max = Math.max(...series), n = series.length;
  const pts = series.map((v,i)=>
    `${(i/(n-1))*300},${52 - (max ? (v/max)*48 : 0)}`).join(" ");
  return `<div class="spark">
    <svg viewBox="0 0 300 54" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="#d98e32"
        stroke-width="2" stroke-linejoin="round"/>
    </svg>
    <div class="lbl"><span>${esc(I.jan)}</span><span>${esc(I.trend)} ${DATA.year}</span><span>${esc(I.dec)}</span></div>
  </div>`;
}

let html = `
<section class="card">
  <div class="eyebrow"><b>${esc(DATA.house)}</b> · localhost</div>
  <h1>${esc(DATA.intro_title)}</h1>
  <p class="sub">${esc(DATA.intro_sub)}</p>
  <div class="hint">${esc(I.scroll)} &darr;</div>
</section>`;

DATA.stats.forEach((s, i) => {
  html += `
<section class="card">
  <div class="idx">${String(i+1).padStart(2,"0")}/${String(DATA.stats.length).padStart(2,"0")}</div>
  <div class="eyebrow">${esc(s.id)}</div>
  <h2>${esc(s.headline)}</h2>
  ${odometer(s.display_value)}
  <div class="unit">${esc(s.unit)}</div>
  ${s.quip ? `<p class="quip">${esc(s.quip)}</p>` : ""}
  ${s.footnote ? `<p class="footnote">${esc(s.footnote)}</p>` : ""}
  ${sparkline(s.series)}
</section>`;
});

html += `
<section class="card outro">
  <div class="eyebrow"><b>${esc(DATA.house)}</b> · ${esc(String(DATA.year))}</div>
  <h1>${esc(DATA.outro_title)}</h1>
  <p class="sub">${esc(DATA.outro_sub)}</p>
  <span class="stamp">Generated by Home Assistant</span>
</section>`;

app.innerHTML = html;

// roll the digit reels when a card scrolls into view
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(!e.isIntersecting) return;
    e.target.querySelectorAll(".reel").forEach((r, j) => {
      const d = +r.dataset.digit;
      const go = () => r.style.transform = `translateY(${-d * 1.35}em)`;
      reduced ? go() : setTimeout(go, 120 * j);
    });
    io.unobserve(e.target);
  });
},{threshold:.55});
document.querySelectorAll(".card").forEach(c => io.observe(c));
</script>
</body>
</html>
