<!DOCTYPE html>
<html lang="en" id="root">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HA Wrapped</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Archivo:wdth,wght@62..125,700..900&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:dark;
    --bg:#0e0e12;
    --bg2:#17171f;
    --accent:#1db954;      /* default; rotated per card via .acc* */
    --ink:#f3f1ee;
    --dim:#8b8b97;
    --line:#2a2a35;
    --bar:#2f2f3b;
    --ok:#3fcf6a;
    --bad:#ff5a4d;
    /* vibrant Wrapped accent rotation */
    --acc0:#1db954; --acc1:#ff4f9a; --acc2:#4f7dff;
    --acc3:#ffd23f; --acc4:#b15cff; --acc5:#ff7a45;
  }
  :root[data-theme="light"]{
    color-scheme:light;
    --bg:#f4f3f7;
    --bg2:#ffffff;
    --accent:#138a3e;
    --ink:#1a1a22;
    --dim:#6b6b78;
    --line:#e3e3ea;
    --bar:#e7e7ef;
    --ok:#138a3e;
    --bad:#d6342a;
    /* darker variants so the loud colors still read on a light ground */
    --acc0:#138a3e; --acc1:#d81f6f; --acc2:#2d57d6;
    --acc3:#b8860b; --acc4:#7c2fd6; --acc5:#d6521f;
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme="dark"]){
      color-scheme:light;
      --bg:#f4f3f7;
      --bg2:#ffffff;
      --accent:#138a3e;
      --ink:#1a1a22;
      --dim:#6b6b78;
      --line:#e3e3ea;
      --bar:#e7e7ef;
      --ok:#138a3e;
      --bad:#d6342a;
      --acc0:#138a3e; --acc1:#d81f6f; --acc2:#2d57d6;
      --acc3:#b8860b; --acc4:#7c2fd6; --acc5:#d6521f;
    }
  }
  /* per-card accent: set on each .card / .stile, cascades to children */
  .acc0{--accent:var(--acc0)} .acc1{--accent:var(--acc1)}
  .acc2{--accent:var(--acc2)} .acc3{--accent:var(--acc3)}
  .acc4{--accent:var(--acc4)} .acc5{--accent:var(--acc5)}
  *{box-sizing:border-box;margin:0}
  html{scroll-snap-type:y mandatory}
  body{
    background:
      radial-gradient(1100px 700px at 50% -10%,
        color-mix(in srgb, var(--accent) 7%, transparent), transparent 60%)
      var(--bg);
    color:var(--ink);
    font-family:"IBM Plex Mono",ui-monospace,monospace;
    transition:background-color .3s ease, color .3s ease;
  }
  .card{
    min-height:100vh; min-height:100svh;
    scroll-snap-align:start;
    display:flex; flex-direction:column; justify-content:center;
    max-width:480px; margin:0 auto;
    padding:48px 24px calc(48px + env(safe-area-inset-bottom));
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
    position:relative;
    /* per-card accent wash — the Wrapped pop */
    background:radial-gradient(820px 520px at 50% 6%,
      color-mix(in srgb, var(--accent) 14%, transparent), transparent 62%);
  }
  .eyebrow{
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--dim); margin-bottom:18px;
    overflow-wrap:anywhere;
  }
  .eyebrow b{color:var(--accent); font-weight:500}
  h1,h2{
    font-family:"Archivo",sans-serif;
    font-variation-settings:"wdth" 70;
    font-weight:900; line-height:.95; text-transform:uppercase;
    overflow-wrap:break-word;
  }
  h1{font-size:clamp(44px,11vw,72px)}
  h2{font-size:clamp(28px,7vw,40px); margin-bottom:28px}
  .sub{color:var(--dim); font-size:14px; line-height:1.6; margin-top:20px}

  /* signature: mechanical meter readout */
  .odo{display:flex; gap:5px; flex-wrap:wrap; margin:6px 0 10px}
  .odo .d{
    background:var(--bg2);
    border:1px solid var(--line);
    border-bottom:3px solid var(--accent);
    border-radius:4px;
    min-width:.72em; padding:6px 4px 4px;
    font-size:clamp(40px,10vw,64px); font-weight:700;
    text-align:center; color:var(--ink);
    overflow:hidden; height:1.35em; position:relative;
  }
  .odo .sep{font-size:clamp(40px,10vw,64px); font-weight:700; color:var(--dim); align-self:flex-end}
  .odo.sm .d{font-size:clamp(28px,7.4vw,46px)}
  .odo.sm .sep{font-size:clamp(28px,7.4vw,46px)}
  .odo .d .reel{display:block; transform:translateY(0); transition:transform 1.6s cubic-bezier(.16,1,.3,1)}
  .odo .d .reel span{display:block; height:1.35em; line-height:1.35em}
  .unit{color:var(--accent); font-size:15px; letter-spacing:.14em; text-transform:uppercase}

  .quip{margin-top:26px; font-size:15px; line-height:1.65; color:var(--ink)}
  .quip::before{content:"// "; color:var(--accent)}
  .footnote{margin-top:10px; font-size:12px; color:var(--dim); line-height:1.5}

  .spark{margin-top:34px}
  .spark svg{width:100%; height:60px; display:block}
  /* one small label per bar, evenly spaced to line up under the bars */
  .spark .axis{display:flex; margin-top:6px}
  .spark .axis span{flex:1 1 0; min-width:0; text-align:center; font-size:9px;
    letter-spacing:.02em; color:var(--dim); text-transform:uppercase;
    overflow:hidden; white-space:nowrap}
  .spark .cap{text-align:center; font-size:10px; letter-spacing:.18em;
    color:var(--dim); margin-top:5px; text-transform:uppercase}

  .idx{position:absolute; top:24px; right:24px; font-size:11px; color:var(--dim)}
  .hint{position:absolute; bottom:calc(22px + env(safe-area-inset-bottom)); left:24px;
    font-size:11px; letter-spacing:.2em; color:var(--dim); text-transform:uppercase}
  .outro .stamp{
    display:inline-block; margin-top:30px; padding:10px 14px;
    border:1px solid var(--accent); color:var(--accent);
    font-size:12px; letter-spacing:.2em; text-transform:uppercase;
    transform:rotate(-2deg);
  }

  /* recap card: compact grid of every stat, made for screenshots/export */
  .summary{justify-content:flex-start}
  .summary h1{margin-bottom:2px}
  .summary .sgrid{
    flex:1; display:grid; grid-template-columns:repeat(2,1fr);
    grid-auto-rows:1fr; gap:14px; margin:26px 0;
  }
  .summary .stile{
    display:flex; flex-direction:column;
    background:var(--bg2); border:1px solid var(--line);
    border-top:3px solid var(--accent);
    border-radius:12px; padding:22px 20px 18px; overflow:hidden;
  }
  .summary .snum{
    font-family:"Archivo",sans-serif; font-variation-settings:"wdth" 70;
    font-weight:900; line-height:1; color:var(--ink);
    font-size:clamp(30px,7.4vw,52px);
    display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;
  }
  .summary .sunit{
    font-family:"IBM Plex Mono",ui-monospace,monospace;
    font-variation-settings:normal;
    font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent); font-weight:500;
  }
  .summary .slabel{
    margin-top:10px; font-size:13px; line-height:1.4; color:var(--dim);
    text-transform:uppercase; letter-spacing:.06em;
  }
  /* the monthly chart grows to fill the tile: a real bar graph, not a strip */
  .summary .spark.mini{flex:1; min-height:60px; margin:20px 0 0}
  .summary .spark.mini svg{height:100%; min-height:60px}
  .summary .foot{
    text-align:center; font-size:11px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--dim);
  }

  /* fixed chrome: theme toggle + section dots */
  .theme{
    position:fixed; top:14px; left:14px; z-index:10;
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--line); background:var(--bg2); color:var(--dim);
    font-size:16px; line-height:1; cursor:pointer;
  }
  .theme:hover{color:var(--accent); border-color:var(--accent)}
  .dots{
    position:fixed; right:22px; top:50%; transform:translateY(-50%);
    display:none; flex-direction:column; gap:12px; z-index:10;
  }
  .dots button{
    width:9px; height:9px; border-radius:50%; padding:0; cursor:pointer;
    border:1px solid var(--dim); background:transparent;
  }
  .dots button.on{background:var(--accent); border-color:var(--accent)}

  /* self-debug status panel */
  .dbg-btn{
    position:fixed; bottom:calc(14px + env(safe-area-inset-bottom)); right:14px; z-index:10;
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--line); background:var(--bg2); color:var(--dim);
    font-size:14px; line-height:1; cursor:pointer;
  }
  .dbg-btn:hover{color:var(--accent); border-color:var(--accent)}
  .dbg{
    position:fixed; right:14px; bottom:calc(60px + env(safe-area-inset-bottom));
    z-index:11; width:min(440px, calc(100vw - 28px));
    max-height:70vh; overflow:auto; display:none;
    background:var(--bg2); border:1px solid var(--line); border-radius:8px;
    padding:18px; font-size:12px; line-height:1.8; color:var(--ink);
    box-shadow:0 12px 40px rgba(0,0,0,.35);
  }
  .dbg.open{display:block}
  .dbg h3{font:inherit; font-weight:700; letter-spacing:.2em;
    text-transform:uppercase; color:var(--accent); margin-bottom:8px}
  .dbg .row{display:flex; gap:8px}
  .dbg .row span:first-child{flex:none; font-weight:700}
  .dbg .row code{overflow-wrap:anywhere; font:inherit}
  .dbg .ok span:first-child{color:var(--ok)}
  .dbg .warn span:first-child{color:var(--accent)}
  .dbg .fail span:first-child{color:var(--bad)}

  /* fade-up entrance, staggered per element */
  .card > *{opacity:0; transform:translateY(16px);
    transition:opacity .6s ease, transform .6s ease}
  .card > *:nth-child(2){transition-delay:.07s}
  .card > *:nth-child(3){transition-delay:.14s}
  .card > *:nth-child(4){transition-delay:.21s}
  .card > *:nth-child(5){transition-delay:.28s}
  .card > *:nth-child(6){transition-delay:.35s}
  .card > *:nth-child(7){transition-delay:.42s}
  .card > *:nth-child(n+8){transition-delay:.49s}
  .card.in > *{opacity:1; transform:none}

  /* desktop: a wider, larger stage instead of a lost phone column */
  @media (min-width:760px){
    .card{max-width:640px; padding:72px 64px}
    h1{font-size:88px}
    h2{font-size:50px}
    .odo .d{font-size:78px}
    .odo .sep{font-size:78px}
    .odo.sm .d{font-size:54px}
    .odo.sm .sep{font-size:54px}
    .sub,.quip{font-size:16px}
    .spark svg{height:74px}
    .idx{top:32px; right:64px}
    .hint{left:64px}
    .dots{display:flex}
  }
  @media (min-width:1200px){
    .card{max-width:720px}
  }

  @media (prefers-reduced-motion: reduce){
    .odo .d .reel{transition:none}
    .card > *{opacity:1; transform:none; transition:none}
    body{transition:none}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
let DATA = "__WRAPPED_DATA__";

// self-debug: detect the raw, un-rendered template gracefully
const rendered = typeof DATA === "object" && DATA && Array.isArray(DATA.stats);
if(!rendered){
  DATA = {year:new Date().getFullYear(), house:"HA Wrapped", stats:[],
    intro_title:"Not rendered yet",
    intro_sub:"This is the raw template. Run wrapped.py to fill it with " +
      "your data: python3 wrapped.py --config config.yaml",
    i18n:{}};
}

const I = DATA.i18n || {scroll:"scroll",trend:"trend",jan:"Jan",dec:"Dec"};
const root = document.getElementById("root");
root.lang = DATA.lang || "en";
const app = document.getElementById("app");
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// theme: config default, overridden by the user's last toggle choice
let saved = null;
try{ saved = localStorage.getItem("haw-theme"); }catch(e){}
const initial = saved || DATA.theme;
if(initial === "light" || initial === "dark") root.dataset.theme = initial;

function odometer(display){
  // display is a pre-formatted number string like "12.345,6"
  const sm = String(display).length > 7 ? " sm" : "";
  return `<div class="odo${sm}">` + [...display].map(ch =>
    /[0-9]/.test(ch)
      ? `<span class="d"><span class="reel" data-digit="${ch}">` +
        Array.from({length:10},(_,i)=>`<span>${i}</span>`).join("") +
        `</span></span>`
      : `<span class="sep">${esc(ch)}</span>`
  ).join("") + "</div>";
}

function chart(series, mini){
  if(!series || series.filter(v => v !== 0).length < 2) return "";
  // honest zero baseline when the data has real spread; min baseline only
  // for near-constant series (mean temperatures) so their shape stays visible
  const min = Math.min(...series), max = Math.max(...series);
  const base = (min >= 0 && max && (max - min) / max > 0.35) ? 0 : min;
  const span = (max - base) || 1;
  const W = 300, H = 60, n = series.length, slot = W / n;
  const peak = series.indexOf(max);
  const bars = series.map((v,i) => {
    const bh = 6 + ((v - base) / span) * (H - 8);
    return `<rect x="${(i*slot+2).toFixed(1)}" y="${(H-bh).toFixed(1)}"` +
      ` width="${(slot-4).toFixed(1)}" height="${bh.toFixed(1)}" rx="2"` +
      ` fill="${i === peak ? "var(--accent)" : "var(--bar)"}"/>`;
  }).join("");
  // honest per-bar axis labels: month initials (yearly) or day numbers
  // (monthly). On a long day-axis only every few labels are drawn so they
  // don't collide; the first and last are always kept.
  const periodLabels = (DATA.period && DATA.period.labels) || I.months || [];
  const monthly = DATA.period && DATA.period.mode === "monthly";
  const step = n > 14 ? Math.ceil(n / 8) : 1;
  const axis = mini ? "" : `<div class="axis">` + series.map((_, i) => {
    const show = i === 0 || i === n - 1 || i % step === 0;
    if(!show) return "<span></span>";
    const raw = periodLabels[i] != null ? String(periodLabels[i]) : "";
    return `<span>${esc(monthly ? raw : raw.slice(0, 1))}</span>`;
  }).join("") + `</div>`;
  const cap = mini ? "" : `<div class="cap">${esc(I.trend)} · ` +
    `${esc(DATA.period_label || String(DATA.year))}</div>`;
  return `<div class="spark${mini ? " mini" : ""}">
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${bars}</svg>
    ${axis}${cap}
  </div>`;
}

// self-debug checks: generator metadata + payload sanity
const checks = [];
const check = (level, text) => checks.push({level, text});
if(!rendered){
  check("fail", "payload: placeholder still present — this template has " +
    "not been rendered by wrapped.py yet");
}else{
  check(DATA.stats.length ? "ok" : "fail",
    `payload: ${DATA.stats.length} stats, ${DATA.period_label || DATA.year}`);
  if(DATA.period) check("ok", `period: ${DATA.period.mode}`);
  const m = DATA.meta || {};
  if(m.generated_at) check("ok", `generated: ${m.generated_at}`);
  if(m.range) check("ok", `range: ${m.range[0]} … ${m.range[1]}`);
  if("ai_copy" in m) check(m.ai_copy ? "ok" : "warn",
    m.ai_copy ? "AI copy: generated" : "AI copy: fallback labels");
  (m.entities || []).forEach(e => check(
    e.status.startsWith("ok") ? "ok" : "warn",
    `${e.kind} ${e.id}: ${e.status}`));
  DATA.stats.forEach(s => {
    if(s.display_value === "?") check("warn", `${s.id}: no value`);
    else if(!(s.series || []).some(v => v !== 0))
      check("warn", `${s.id}: no monthly series, chart hidden`);
  });
}

let html = `
<button class="theme" id="theme" aria-label="${esc(I.theme || "light / dark")}">&#9680;</button>
<button class="dbg-btn" id="dbg-btn" aria-label="status" aria-expanded="false">i</button>
<aside class="dbg" id="dbg">
  <h3>Status</h3>
  ${checks.map(c => `<div class="row ${c.level}"><span>${
    {ok:"&#10003;", warn:"!", fail:"&#10007;"}[c.level]
  }</span><code>${esc(c.text)}</code></div>`).join("")}
</aside>
<nav class="dots" id="dots" aria-hidden="true"></nav>
<section class="card acc0">
  <div class="eyebrow"><b>${esc(DATA.house)}</b> · ${esc(DATA.period_label || String(DATA.year))}</div>
  <h1>${esc(DATA.intro_title)}</h1>
  <p class="sub">${esc(DATA.intro_sub)}</p>
  <div class="hint">${esc(I.scroll)} &darr;</div>
</section>`;

DATA.stats.forEach((s, i) => {
  html += `
<section class="card acc${(i+1)%6}">
  <div class="idx">${String(i+1).padStart(2,"0")}/${String(DATA.stats.length).padStart(2,"0")}</div>
  <div class="eyebrow">${esc(s.id)}</div>
  <h2>${esc(s.headline)}</h2>
  ${odometer(s.display_value)}
  <div class="unit">${esc(s.unit)}</div>
  ${s.quip ? `<p class="quip">${esc(s.quip)}</p>` : ""}
  ${s.footnote ? `<p class="footnote">${esc(s.footnote)}</p>` : ""}
  ${chart(s.series)}
</section>`;
});

if(rendered) html += `
<section class="card summary acc1">
  <div class="eyebrow"><b>${esc(DATA.house)}</b> · ${esc(DATA.period_label || String(DATA.year))}</div>
  <h1>${esc(I.summary_title || "Recap")}</h1>
  <div class="sgrid">
    ${DATA.stats.map((s, i) => `
    <div class="stile acc${i%6}">
      <div class="snum">${esc(s.display_value)}<span class="sunit">${esc(s.unit)}</span></div>
      <div class="slabel">${esc(s.headline)}</div>
      ${chart(s.series, true)}
    </div>`).join("")}
  </div>
  <div class="foot">${esc(I.generated_by || "Generated by Home Assistant")}</div>
</section>`;

if(rendered) html += `
<section class="card outro acc2">
  <div class="eyebrow"><b>${esc(DATA.house)}</b> · ${esc(DATA.period_label || String(DATA.year))}</div>
  <h1>${esc(DATA.outro_title)}</h1>
  <p class="sub">${esc(DATA.outro_sub)}</p>
  <span class="stamp">${esc(I.generated_by || "Generated by Home Assistant")}</span>
</section>`;

app.innerHTML = html;

const dbg = document.getElementById("dbg");
const dbgBtn = document.getElementById("dbg-btn");
dbgBtn.addEventListener("click", () => {
  dbgBtn.setAttribute("aria-expanded", String(dbg.classList.toggle("open")));
});
// surface problems without being asked
if(checks.some(c => c.level === "fail")) dbg.classList.add("open");

document.getElementById("theme").addEventListener("click", () => {
  const dark = root.dataset.theme === "dark" ||
    (!root.dataset.theme && !matchMedia("(prefers-color-scheme: light)").matches);
  const next = dark ? "light" : "dark";
  root.dataset.theme = next;
  try{ localStorage.setItem("haw-theme", next); }catch(e){}
});

const cards = [...document.querySelectorAll(".card")];

// section dots (desktop only, via CSS)
const dots = document.getElementById("dots");
dots.innerHTML = cards.map((_,i) => `<button data-i="${i}" tabindex="-1"></button>`).join("");
dots.addEventListener("click", e => {
  const b = e.target.closest("button");
  if(b) cards[+b.dataset.i].scrollIntoView({behavior:"smooth"});
});
const watcher = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(!e.isIntersecting) return;
    const i = cards.indexOf(e.target);
    dots.querySelectorAll("button").forEach((b,j) => b.classList.toggle("on", j === i));
  });
},{threshold:.55});
cards.forEach(c => watcher.observe(c));

// fade the card in and roll the digit reels when it scrolls into view
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(!e.isIntersecting) return;
    e.target.classList.add("in");
    e.target.querySelectorAll(".reel").forEach((r, j) => {
      const d = +r.dataset.digit;
      const go = () => r.style.transform = `translateY(${-d * 1.35}em)`;
      reduced ? go() : setTimeout(go, 120 * j);
    });
    io.unobserve(e.target);
  });
},{threshold:.55});
cards.forEach(c => io.observe(c));
</script>
</body>
</html>
